version: '3.8'

services:
  auto-signin:
    build: .
    container_name: auto-signin
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import autosignin; print('OK')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
