name: Auto Distribute 996 Agent

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 🚀 Run Universal Distribution System
      run: |
        python auto_distribute.py
    
    - name: 📝 Create Distribution Summary
      run: |
        echo "## 🚀 Distribution Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Project: 996 Agent v4.0" >> $GITHUB_STEP_SUMMARY
        echo "- Platforms: 13+" >> $GITHUB_STEP_SUMMARY
        echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Published Content" >> $GITHUB_STEP_SUMMARY
        echo "- README.md & SKILL.md published to Gist network" >> $GITHUB_STEP_SUMMARY
        echo "- All viral content pre-generated for all platforms" >> $GITHUB_STEP_SUMMARY
        echo "- Culture-specific hashtags ready for all 4 regions" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🌏 Regions Covered" >> $GITHUB_STEP_SUMMARY
        echo "- 🇨🇳 China - 996 / Wolf Culture" >> $GITHUB_STEP_SUMMARY
        echo "- 🇯🇵 Japan - Shachiku / Senpai Kohai" >> $GITHUB_STEP_SUMMARY
        echo "- 🇰🇷 Korea - Chaebol / Burning Passion" >> $GITHUB_STEP_SUMMARY
        echo "- 🇺🇸 West - Hustle / Grind Culture" >> $GITHUB_STEP_SUMMARY
    
    - name: 🌐 Auto-Ping Star Exchange Network
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Star exchange network activated"
        echo "Repository: https://github.com/badhope/996-Skill"
        echo "If you like this project, give it a ⭐ !"
